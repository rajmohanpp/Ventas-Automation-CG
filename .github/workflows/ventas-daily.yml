name: Ventas Daily Dashboard

# 10:00 IST = 04:30 UTC. GitHub cron is always UTC.
on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch: {}        # adds a manual "Run workflow" button

jobs:
  send-dashboard:
    runs-on: ubuntu-latest      # has Python + LibreOffice preinstalled
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LibreOffice + poppler (for the inline slide image)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice-impress poppler-utils

      - name: Install dependencies
        run: pip install -r cloudrun/requirements.txt

      - name: Run Ventas pipeline (fetch -> build -> Drive -> email)
        env:
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}     # contents of token_ventas.json
          MAIL_TO: "raj.mohan@6dtech.co.in"
          MAIL_CC: "hari.krishnan@6dtech.co.in"
          MAIL_BCC: ""
          VENTAS_WORKDIR: ${{ runner.temp }}
        run: python run_daily.py
